name: napster
description: Napster - Powernap preset alarm app.
publish_to: 'none'
version: 1.0.0+1
environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.22.0'
dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  shared_preferences: ^2.2.2
  flutter_local_notifications: ^17.1.2
  timezone: ^0.9.2
  intl: ^0.19.0
  in_app_purchase: ^3.1.11
  url_launcher: ^6.2.5
  package_info_plus: ^8.0.0
  permission_handler: ^11.3.1
  audioplayers: ^5.2.1
  equatable: ^2.0.5
  uuid: ^4.4.0
  hooks_riverpod: ^2.5.1
  flutter_hooks: ^0.20.5
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2
flutter:
  uses-material-design: true
  assets:
    - assets/audio/
    - assets/images/
  generate: true
